<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>pacer · 高考陪跑AI</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>

<canvas id="fluid-canvas" class="fluid-canvas" aria-hidden="true"></canvas>
<script src="/static/fluid-background.js"></script>

<!-- Login -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-dot"></div>
      <div class="login-brand-text">pacer</div>
      <div class="login-brand-sub">高考陪跑AI</div>
    </div>
    <form onsubmit="Pacer.login();return false">
      <div class="login-field">
        <label for="login-student-id">学号</label>
        <input id="login-student-id" type="text" placeholder="输入学号" autofocus>
      </div>
      <div class="login-field">
        <label for="login-pin">密码（PIN）</label>
        <input id="login-pin" type="password" placeholder="输入 PIN">
      </div>
      <button type="submit" class="login-btn">进入 pacer</button>
    </form>
  </div>
</div>

<!-- Chat -->
<div id="chat-screen" class="app" style="display:none">

  <aside class="sidebar">
    <div class="sidebar-brand"><span class="sidebar-brand-dot"></span> pacer</div>

    <button class="sidebar-btn" onclick="Pacer.newChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14M5 12h14"/></svg>
      <span class="sidebar-btn-text">新对话</span>
    </button>

    <div class="sidebar-section-label">快捷入口</div>
    <button class="sidebar-btn" onclick="Pacer.sendPreset('帮我制定今天的学习计划')">📋 今日计划</button>
    <button class="sidebar-btn" onclick="Pacer.sendPreset('帮我复盘最近的错题')">📝 错题复盘</button>
    <button class="sidebar-btn" onclick="Pacer.sendPreset('生成今天的学习日报')">📊 学习日报</button>

    <div class="sidebar-spacer"></div>
    <div class="sidebar-footer">
      <button class="sidebar-footer-btn" onclick="alert('个人中心将在后续版本上线')">👤 个人中心</button>
      <button class="sidebar-footer-btn" onclick="Pacer.logout()">🚪 退出</button>
    </div>
  </aside>

  <main class="main">
    <header class="header">
      <span class="header-title" id="header-name">同学 · pacer</span>
      <button class="theme-btn" onclick="Pacer.toggleTheme()" title="切换主题">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </header>

    <div class="chat" id="chat-scroll">
      <div class="chat-inner" id="messages">
        <div id="empty-state" class="empty-state">
          <div class="empty-state-icon">☀️</div>
          <h1>早上好</h1>
          <p>我是你的 AI 班主任。试试下面的功能，或者直接问我任何问题。</p>
          <div class="suggestions" id="suggestions">
            <button class="suggestion" onclick="Pacer.sendPreset('帮我讲一道导数题')">📐 讲一道导数题</button>
            <button class="suggestion" onclick="Pacer.sendPreset('帮我制定今天的学习计划')">📋 今日学习计划</button>
            <button class="suggestion" onclick="Pacer.sendPreset('帮我分析一下这道错题')">📝 分析错题</button>
            <button class="suggestion" onclick="Pacer.sendPreset('最近有点焦虑，想聊聊')">💭 聊聊压力</button>
          </div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-inner">
        <button class="upload-btn" onclick="document.getElementById('file-input').click()" title="上传题目图片">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </button>
        <textarea id="chat-input" class="chat-input" rows="1" placeholder="输入消息，或者拍照上传题目..."
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();Pacer.send()}"></textarea>
        <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="Pacer.upload(this)">
        <button class="send-btn" id="send-btn" onclick="Pacer.send()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18v-6a9 9 0 0118 0v6"></path><path d="M21 19a2 2 0 01-2 2H5a2 2 0 01-2-2v-3h18v3z"/></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<script src="/static/app.js"></script>
</body>
</html>
